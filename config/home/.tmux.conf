# ── Terminal & Colors ────────────────────────────────────────────────────────
set -g  default-terminal   "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -as terminal-features  ',xterm-256color:clipboard'

# ── Core options ─────────────────────────────────────────────────────────────
set -g  mouse             on
set -g  history-limit     100000
set -g  base-index        1
setw -g pane-base-index   1
set -g  renumber-windows  on
set -g  set-clipboard     on
set -g  escape-time       0
set -g  focus-events      on
set -g  detach-on-destroy off
set -g  status-interval   5
set -g  visual-activity   off
set -g  display-time      2500
set -g  repeat-time       300

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind  C-a send-prefix

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "  tmux reloaded"

# ── Windows / Panes ──────────────────────────────────────────────────────────
bind '|'  split-window -h -c '#{pane_current_path}'
bind '-'  split-window -v -c '#{pane_current_path}'
bind c    new-window -c '#{pane_current_path}'
bind Enter new-window -c '#{pane_current_path}'
bind b    break-pane -d
bind z    resize-pane -Z
bind q    confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind x    confirm-before -p "kill-window #W? (y/n)" kill-window
bind X    confirm-before -p "kill-session #S? (y/n)" kill-session
bind C    command-prompt -p "rename-session" "rename-session '%%'"
bind ','  command-prompt -I '#W' 'rename-window %%'

# ── Popups ────────────────────────────────────────────────────────────────────
bind f  display-popup -E "tmux-sessionizer"
bind p  display-popup -E "tmux choose-tree -Zw"
bind o  display-popup -E "bash -lc 'cd #{pane_current_path} && exec zsh'"
bind t  display-popup -E "bash -lc 'cd #{pane_current_path} && btop'"
bind n  display-popup -E "bash -lc 'cd #{pane_current_path} && nvim'"
bind g  display-popup -E "bash -lc 'cd #{pane_current_path} && lazygit || git status'"
bind s  display-popup -E "tmux ls"

# ── Copy mode ────────────────────────────────────────────────────────────────
bind '[' copy-mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null"
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ── Pane navigation (vim-tmux-navigator aware) ────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab  last-window
bind Space next-layout

# Alt+arrows to resize
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n C-\\ select-pane -l

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r Left  previous-window
bind -r Right next-window

# ── Window / pane settings ────────────────────────────────────────────────────
setw -g automatic-rename on
setw -g aggressive-resize on
setw -g allow-rename off
setw -g monitor-activity on
set  -g monitor-bell on

# ── Status bar position ───────────────────────────────────────────────────────
set -g status-position bottom

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.2'

# ── Catppuccin theme ──────────────────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,  ,}"

set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

# Build status bar
set -g status-left-length  200
set -g status-right-length 200
set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_user}#{E:@catppuccin_status_date_time}"

# ── Session save/restore ──────────────────────────────────────────────────────
set -g @continuum-restore      'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# ── Yank ──────────────────────────────────────────────────────────────────────
set -g @yank_selection 'clipboard'

# ── Initialize TPM (keep at end) ──────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
