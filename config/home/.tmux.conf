set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g focus-events on
set -g detach-on-destroy off
set -g status-interval 5
set -g visual-activity off
set -g display-time 2500
set -g repeat-time 300

thm_bg='#1a1b26'
thm_bg_float='#1f2335'
thm_bg_highlight='#292e42'
thm_blue='#7aa2f7'
thm_cyan='#7dcfff'
thm_green='#9ece6a'
thm_magenta='#bb9af7'
thm_red='#f7768e'
thm_yellow='#e0af68'
thm_fg='#c0caf5'
thm_fg_dark='#a9b1d6'
thm_comment='#565f89'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind R command-prompt -I "#{pane_current_path}" "split-window -h -c '%%'"
bind ? display-popup -E "tmux-cheatsheet"
bind '|' split-window -h -c '#{pane_current_path}'
bind '-' split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'
bind Enter new-window -c '#{pane_current_path}'
bind e split-window -h -c '#{pane_current_path}' 'nvim'
bind b break-pane -d
bind z resize-pane -Z
bind q confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind x confirm-before -p "kill-window #W? (y/n)" kill-window
bind X confirm-before -p "kill-session #S? (y/n)" kill-session
bind C command-prompt -p "rename-session" "rename-session '%%'"
bind ',' command-prompt -I '#W' 'rename-window %%'
bind f display-popup -E "tmux-sessionizer"
bind p display-popup -E "tmux choose-tree -Zw"
bind o display-popup -E "bash -lc 'cd #{pane_current_path} && exec zsh'"
bind t display-popup -E "bash -lc 'cd #{pane_current_path} && btop'"
bind n display-popup -E "bash -lc 'cd #{pane_current_path} && nvim'"
bind g display-popup -E "bash -lc 'cd #{pane_current_path} && lazygit || git status'"
bind s display-popup -E "tmux ls"
bind '[' copy-mode

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab last-window
bind Space next-layout

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r Left previous-window
bind -r Right next-window

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy-buffer >/dev/null"
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line
bind-key -T copy-mode-vi Escape send-keys -X cancel

setw -g mode-keys vi
setw -g automatic-rename on
setw -g aggressive-resize on
setw -g allow-rename off
setw -g monitor-activity on
set -g monitor-bell on
set -g status-position bottom
set -g status-style bg=default,fg=$thm_fg
set -g status-left-length 80
set -g status-right-length 160
set -g status-left '#[fg=$thm_bg,bg=$thm_blue,bold] session #S #[fg=$thm_fg_dark,bg=default] #{?window_zoomed_flag,[zoom],#{pane_current_command}} '
set -g status-right '#{?client_prefix,#[fg=$thm_bg,bg=$thm_magenta,bold] PREFIX #[default],}#[fg=$thm_bg,bg=$thm_bg_highlight] dir #(basename #{pane_current_path}) #[default]#[fg=$thm_bg,bg=$thm_bg_float] host #H #[default]#[fg=$thm_bg,bg=$thm_cyan] %Y-%m-%d #[default]#[fg=$thm_bg,bg=$thm_green] %H:%M '
setw -g window-status-current-format '#[fg=$thm_bg,bg=$thm_blue,bold] #I #[fg=$thm_fg,bg=$thm_bg_highlight] #W #[default]'
setw -g window-status-format '#[fg=$thm_fg_dark,bg=$thm_bg_float] #I #W #[default]'
setw -g window-status-separator ''
setw -g window-status-activity-style fg=$thm_yellow,bold
setw -g window-status-bell-style fg=$thm_red,bold
set -g message-style bg=$thm_blue,fg=$thm_bg,bold
set -g message-command-style bg=$thm_magenta,fg=$thm_bg,bold
set -g pane-active-border-style fg=$thm_blue
set -g pane-border-style fg=$thm_comment
set -g pane-border-lines single
set -g popup-style bg=$thm_bg_float,fg=$thm_fg
set -g popup-border-style fg=$thm_blue
