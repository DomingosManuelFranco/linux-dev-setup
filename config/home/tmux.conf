# ── Terminal & Colors ────────────────────────────────────────────────────────
set -g  default-terminal   "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -as terminal-features  ',xterm-256color:clipboard,alacritty:RGB,alacritty:clipboard,tmux-256color:RGB'

# ── Core options ─────────────────────────────────────────────────────────────
set -g  default-shell     "/usr/bin/fish"
set -g  default-command   "/usr/bin/fish"
set -g  mouse             on
set -g  history-limit     100000
set -g  base-index        1
setw -g pane-base-index   1
set -g  renumber-windows  on
set -g  set-clipboard     on
set -g  escape-time       0
set -g  focus-events      on
set -g  detach-on-destroy off
set -g  status-interval   5
set -g  visual-activity   off
set -g  display-time      2500
set -g  repeat-time       300
set -g  status-keys       vi

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind  C-a send-prefix

# ── Reload ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "  tmux reloaded"

# ── Windows / Panes ──────────────────────────────────────────────────────────
bind '|'  split-window -h -c '#{pane_current_path}'
bind '-'  split-window -v -c '#{pane_current_path}'
bind c    new-window -c '#{pane_current_path}'
bind Enter new-window -c '#{pane_current_path}'
bind b    break-pane -d
bind z    resize-pane -Z
bind q    confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind x    confirm-before -p "kill-window #W? (y/n)" kill-window
bind X    confirm-before -p "kill-session #S? (y/n)" kill-session
bind C    command-prompt -p "rename-session" "rename-session '%%'"
bind ','  command-prompt -I '#W' 'rename-window %%'
bind y    set-window-option synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}"
bind .    command-prompt -p "move-window to index" "move-window -t '%%'"
bind R    command-prompt -p "run shell command" "run-shell '%%'"

# ── Popups ────────────────────────────────────────────────────────────────────
bind f  display-popup -w 85% -h 85% -E "tmux-sessionizer"
bind p  display-popup -w 90% -h 85% -E "tmux choose-tree -Zw"
bind o  display-popup -w 80% -h 80% -E "bash -lc 'cd #{pane_current_path} && exec fish'"
bind t  display-popup -w 80% -h 80% -E "bash -lc 'cd #{pane_current_path} && if command -v btop >/dev/null; then exec btop; elif command -v htop >/dev/null; then exec htop; else exec top; fi'"
bind n  display-popup -w 90% -h 90% -E "bash -lc 'cd #{pane_current_path} && nvim'"
bind g  display-popup -w 90% -h 90% -E "bash -lc 'cd #{pane_current_path} && if command -v lazygit >/dev/null; then exec lazygit; elif git rev-parse --is-inside-work-tree >/dev/null 2>&1; then exec git status; else printf \"Not a git repository\\n\"; read; fi'"
bind s  display-popup -w 70% -h 75% -E "tmux ls"
bind e  display-popup -w 90% -h 90% -E "bash -lc 'cd #{pane_current_path} && if command -v yazi >/dev/null; then exec yazi; elif command -v ranger >/dev/null; then exec ranger; elif command -v lf >/dev/null; then exec lf; else exec fish; fi'"
bind d  display-popup -w 80% -h 80% -E "bash -lc 'cd #{pane_current_path} && if command -v lazydocker >/dev/null; then exec lazydocker; elif command -v docker >/dev/null; then exec watch -n 2 docker ps --format \"table {{.Names}}\\t{{.Status}}\\t{{.Ports}}\"; else printf \"Docker is not installed\\n\"; read; fi'"
bind i  display-popup -w 75% -h 80% -E "bash -lc 'cd #{pane_current_path} && if command -v dust >/dev/null; then dust; else du -sh .[^.]* * 2>/dev/null | sort -h; fi'"
bind v  display-popup -w 80% -h 80% -E "bash -lc 'cd #{pane_current_path} && if [[ -f README.md ]]; then if command -v glow >/dev/null; then exec glow -p README.md; else exec less README.md; fi; else printf \"README.md not found in %s\\n\" "$PWD"; read; fi'"

# ── Copy mode ────────────────────────────────────────────────────────────────
bind '[' copy-mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || pbcopy 2>/dev/null"
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ── Pane navigation (vim-tmux-navigator aware) ────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab  last-window
bind Space next-layout

# Alt+arrows to resize
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n C-\\ select-pane -l

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r Left  previous-window
bind -r Right next-window
bind -r m swap-window -t -1
bind -r M swap-window -t +1

# ── Window / pane settings ────────────────────────────────────────────────────
setw -g automatic-rename on
setw -g aggressive-resize on
setw -g allow-rename off
setw -g monitor-activity on
set  -g monitor-bell on

# ── Status bar position ───────────────────────────────────────────────────────
set -g status-position bottom

# ── Theme ─────────────────────────────────────────────────────────────────────
set -g status on
set -g status-justify centre
set -g status-style 'bg=#0b0f12,fg=#d3e0dd'
set -g message-style 'bg=#254640,fg=#f8fffd'
set -g message-command-style 'bg=#254640,fg=#f8fffd'
set -g mode-style 'bg=#fff372,fg=#0b0f12,bold'

set -g pane-border-style 'fg=#266355'
set -g pane-active-border-style 'fg=#8fd6c6'
set -g popup-style 'bg=#12161a,fg=#e2e7ea'
set -g popup-border-style 'fg=#7acbb9'

setw -g window-status-separator ''
setw -g window-status-format '#[fg=#266355,bg=#0b0f12]#[fg=#808b88,bg=#12161a] #{?window_last_flag,#[fg=#fff372],}#I #[fg=#d3e0dd]#W #{?window_activity_flag,#[fg=#fff372]● ,}#[fg=#12161a,bg=#0b0f12]#[default]'
setw -g window-status-current-format '#[fg=#7acbb9,bg=#0b0f12]#[fg=#0b0f12,bg=#8fd6c6,bold] #{?window_zoomed_flag,󰁌 ,}#I #[fg=#0b0f12,bold]#W#{?window_flags, #[fg=#254640]#F,} #[fg=#8fd6c6,bg=#0b0f12]#[default]'
setw -g window-status-activity-style 'fg=#0b0f12,bg=#fff372,bold'
setw -g window-status-bell-style 'fg=#0b0f12,bg=#f69b6e,bold'

set -g status-left-length 120
set -g status-right-length 200
set -g status-left '#[fg=#8fd6c6,bg=#0b0f12]#[fg=#0b0f12,bg=#8fd6c6,bold] #{?client_prefix,PREFIX,󰣇} #[fg=#e2e7ea,bg=#254640,bold] #S #[fg=#254640,bg=#0b0f12]#[default]'
set -g status-right '#[fg=#0b0f12,bg=#{?pane_synchronized,#f69b6e,#{?pane_in_mode,#fff372,#12161a}}] #{?pane_synchronized,SYNC,#{?pane_in_mode,COPY,NORMAL}} #[fg=#{?pane_synchronized,#f69b6e,#{?pane_in_mode,#fff372,#12161a}},bg=#0b0f12]#[fg=#7acbb9] #(whoami) #[fg=#808b88]@ #[fg=#d3e0dd]#H #[fg=#808b88]| #[fg=#a9ebdc]#{=/40/...:#{b:pane_current_path}} #[fg=#7acbb9,bg=#0b0f12]#[fg=#0b0f12,bg=#7acbb9,bold] %a %d %b #[fg=#6bd671,bg=#7acbb9]#[fg=#0b0f12,bg=#6bd671,bold] %H:%M '

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ── Plugin options ────────────────────────────────────────────────────────────
set -g @prefix_highlight_fg '#0b0f12'
set -g @prefix_highlight_bg '#fff372'
set -g @prefix_highlight_copy_mode_attr 'fg=#0b0f12,bg=#f69b6e,bold'

# ── Session save/restore ──────────────────────────────────────────────────────
set -g @continuum-restore      'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-boot 'on'

# ── Yank ──────────────────────────────────────────────────────────────────────
set -g @yank_selection 'clipboard'

# ── TPM shortcuts ─────────────────────────────────────────────────────────────
bind I run-shell '~/.tmux/plugins/tpm/bin/install_plugins'\; display-message 'plugins installed'
bind U run-shell '~/.tmux/plugins/tpm/bin/update_plugins all'\; display-message 'plugins updated'
bind M run-shell '~/.tmux/plugins/tpm/bin/clean_plugins'\; display-message 'plugins cleaned'

# ── Initialize TPM (keep at end) ──────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
